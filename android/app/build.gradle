plugins {
    id 'com.android.application'
}

android {
    namespace 'com.deadrush.game'
    compileSdk 36

    defaultConfig {
        applicationId "com.deadrush.game"
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// Sync the built web game (web/dist) into assets before every build.
tasks.register('syncWebAssets', Copy) {
    from rootProject.file('../web/dist')
    into layout.projectDirectory.dir('src/main/assets/www')
    include 'index.html', 'game.bundle.js'
}
preBuild.dependsOn syncWebAssets
